<!DOCTYPE html>
<html lang="ko-KR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>2048 미니게임</title>
	<script src="jquery-3.7.1.min.js"></script>
	<script src="jquery.qrcode-1.0.3.min.js"></script>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<h1>2048</h1>
	<main>
		<section class="scores">
			<div class="score">
				<div class="score-label">점수</div>
				<div class="score-value" id="score">0</div>
			</div>
			<div class="score">
				<div class="score-label">최고점</div>
				<div class="score-value" id="best-score">0</div>
			</div>
		</section>

		<div id="game"></div>

		<div class="btns">
			<button id="restart">새 게임</button>
			<button id="toggle-intro">게임 방법</button>
		</div>

		<aside class="intro collapsible" id="intro">
			<h3>게임 설명</h3>
			<p>&#x1F3AE; 같은 숫자를 합쳐 더 큰 숫자를 만드세요.</p>
			<p>&#x1F3AF; 2048을 만들면 승리하며 더 높은 점수에 도전하세요.</p>
			<p>&#x2328;&#xFE0F; PC: 방향키로 조작합니다.</p>
			<p>&#x1F4F1; 모바일: 화면을 스와이프하세요.</p>
			<p>&#x1F95A; 이스터에그: 아래로 10번 스와이프</p>
			<p id="qrcode"></p>
		</aside>
	</main>

	<footer>
		&copy; <span id="Year"></span> Bill74186 | 2048 Game<br>
		<a href="index.html">← 언어 변경</a>
	</footer>

	<div id="load" class="ltx">Loading…</div>
	<div class="ver">v2.3.9 · <a href="index.html">Bill74186</a></div>

	<script src="script.js"></script>
	
	<script>
		let now = new Date();
		let currentYear = now.getUTCFullYear();
		document.getElementById("Year").innerText = currentYear;

		$(document).ready(function () {
			$('#game').init2048({
				bestScoreKey: '2048-best-koKR',
				textGameOver: '게임 오버',
				textNewGame: '새 게임',
				textWin: '승리!',
				textKeepPlaying: '계속하기',
				textHide: '닫기',
				textHowToPlay: '게임 방법'
			});
			$('#intro').on('touchmove', function (e) {
				e.stopPropagation();
			});
		});
	</script>
</body>
</html>
