<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>2048小游戏</title>
	<script src="jquery-3.7.1.min.js"></script>
	<script src="jquery.qrcode-1.0.3.min.js"></script>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<h1>2048</h1>
	<main>
		<section class="scores">
			<div class="score">
				<div class="score-label">当前分数</div>
				<div class="score-value" id="score">0</div>
			</div>
			<div class="score">
				<div class="score-label">最高分数</div>
				<div class="score-value" id="best-score">0</div>
			</div>
		</section>

		<div id="game"></div>

		<div class="btns">
			<button id="restart">重新开始</button>
			<button id="toggle-intro">游戏介绍</button>
		</div>

		<aside class="intro collapsible" id="intro">
			<h3>游戏说明</h3>
			<p>&#x1F3AE; 玩法：滑动方块，相同数字合并成更大数字</p>
			<p>&#x1F3AF; 目标：合成2048通关，可继续挑战更高分</p>
			<p>&#x2328;&#xFE0F; 电脑：上下左右方向键控制</p>
			<p>&#x1F4F1; 手机：上下左右滑动屏幕控制</p>
			<p>&#x1F95A; 彩蛋：向下滑动10次！有惊喜</p>
			<p id="box"></p>
			<p id="qrcode"></p>
		</aside>
	</main>

	<footer>
		&copy; <span id="Year">XXXX</span> Bill74186 | 2048 Game<br>
		<a href="index.html">← 选择其他语言</a>
	</footer>

	<div id="load" class="ltx">Loading…</div>
	<div class="ver">v2.5.6 · <a href="index.html">Bill74186</a></div>

	<script src="script.js"></script>

	<script>
		$(document).ready(function () {
			$('#game').init2048({
				bestScoreKey: '2048-best-zhCN',
				textGameOver: '游戏结束',
				textNewGame: '重新开始',
				textWin: '恭喜通关！',
				textKeepPlaying: '继续挑战',
				textHide: '收起介绍',
				textHowToPlay: '游戏介绍'
			});
		
			$('#intro').on('touchmove', function (e) {
				e.stopPropagation();
			});
		});
	</script>

</body>

</html>
