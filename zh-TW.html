<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>2048小遊戲</title>
	<script src="jquery-3.7.1.min.js"></script>
	<script src="jquery.qrcode-1.0.3.min.js"></script>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<h1>2048</h1>
	<main>
		<section class="scores">
			<div class="score">
				<div class="score-label">目前分數</div>
				<div class="score-value" id="score">0</div>
			</div>
			<div class="score">
				<div class="score-label">最高分數</div>
				<div class="score-value" id="best-score">0</div>
			</div>
		</section>

		<div id="game"></div>

		<div class="btns">
			<button id="restart">重新開始</button>
			<button id="toggle-intro">遊戲介紹</button>
		</div>

		<aside class="intro collapsible" id="intro">
			<h3>遊戲說明</h3>
			<p>&#x1F3AE; 玩法：滑動方塊，相同數字合併成更大數字</p>
			<p>&#x1F3AF; 目標：合成2048即可通關，可繼續挑戰更高分數</p>
			<p>&#x2328;&#xFE0F; 電腦：上下左右方向鍵操控</p>
			<p>&#x1F4F1; 手機：上下左右滑動螢幕操控</p>
			<p>&#x1F95A; 彩蛋：向下滑動10次觸發驚喜</p>
			<p id="qrcode"></p>
		</aside>
	</main>

	<footer>
		&copy; <span id="Year"></span> Bill74186 | 2048 Game<br>
		<a href="index.html">← 切換語言</a>
	</footer>

	<div id="load" class="ltx">Loading…</div>
	<div class="ver">v2.3.9 · <a href="index.html">Bill74186</a></div>

	<script src="script.js"></script>
	
	<script>
		let now = new Date();
		let currentYear = now.getUTCFullYear();
		document.getElementById("Year").innerText = currentYear;

		$(document).ready(function () {
			$('#game').init2048({
				bestScoreKey: '2048-best-zhTW',
				textGameOver: '遊戲結束',
				textNewGame: '重新開始',
				textWin: '恭喜通關！',
				textKeepPlaying: '繼續挑戰',
				textHide: '收起介紹',
				textHowToPlay: '遊戲介紹'
			});
			$('#intro').on('touchmove', function (e) {
				e.stopPropagation();
			});
		});
	</script>
</body>
</html>
